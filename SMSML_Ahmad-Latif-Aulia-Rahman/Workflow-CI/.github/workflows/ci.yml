name: CI MLflow Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install mlflow pandas scikit-learn matplotlib seaborn

    - name: Run MLflow Project
      run: |
        cd MLProject
        mlflow run . 

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: MLProject/mlruns
        
    - name: Build Docker Image
      run: |
        cd MLProject
        mlflow models build-docker -m mlruns/0/*/artifacts/model -n student-model

    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      run: |
        docker tag student-model ${{ secrets.DOCKER_USERNAME }}/student-model:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/student-model:latest
